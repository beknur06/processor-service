server:
  port: 8082

spring:
  application:
    name: processor-service

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USER:guest}
    password: ${SPRING_RABBITMQ_PASS:guest}
    listener:
      simple:
        concurrency: 2
        max-concurrency: 4
        prefetch: 50
        acknowledge-mode: auto

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemetry}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

rabbitmq:
  queue:
    processor: telemetry.processor

redis:
  channel:
    telemetry: telemetry
    processed: processed
  key:
    last-state-prefix: last_state
    ttl-seconds: 300

clickhouse:
  url: ${SPRING_CLICKHOUSE_URL:jdbc:ch://localhost:8123/digitaltwin?ssl=false&connect_timeout=10000&socket_timeout=300000&compress=0}
  username: ${CLICKHOUSE_USER:app}
  password: ${CLICKHOUSE_PASS:app123}

processor:
  ema:
    alpha: 0.3
    enabled: true
  batch:
    size: 100
    flush-interval-ms: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always